name: Publish static game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f index.html
          test -f styles.css
          test -f src/game.js
          test -f assets/ball.svg
          test -f assets/coin.svg
          test -f assets/background.svg
          node tests/physics-probe.mjs

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          exclude_assets: '.github,tests,README.md'
