  </g>
  <circle cx="64" cy="64" r="62" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2"/>
  <circle cx="64" cy="64" r="60.5" fill="none" stroke="rgba(37,73,77,.13)" stroke-width="1"/>
