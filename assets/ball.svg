<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Perfectly round white arcade ball with turquoise swoosh">
  <defs>
    <radialGradient id="body" cx="31%" cy="24%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#fbfcfb"/>
      <stop offset="0.82" stop-color="#e6eceb"/>
      <stop offset="1" stop-color="#cbd5d5"/>
    </radialGradient>
    <linearGradient id="swoosh" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0c9da7"/>
      <stop offset="0.5" stop-color="#20c8cf"/>
      <stop offset="1" stop-color="#70edf0"/>
