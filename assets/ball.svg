<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Driftline Aqua ball</title>
  <desc id="desc">A perfectly centered pearl arcade ball with a balanced three-part turquoise current emblem.</desc>
  <defs>
    <radialGradient id="shell" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#f5ffff"/>
      <stop offset="0.86" stop-color="#dcebea"/>
      <stop offset="1" stop-color="#aec5c6"/>
    </radialGradient>
    <linearGradient id="current" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#75f5ed"/>
      <stop offset="0.48" stop-color="#25cbd2"/>
      <stop offset="1" stop-color="#087c91"/>
    </linearGradient>
    <clipPath id="ballClip">
      <circle cx="128" cy="128" r="110"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#073b46" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="128" cy="128" r="112" fill="url(#shell)" stroke="#ffffff" stroke-width="5"/>
    <g clip-path="url(#ballClip)" fill="url(#current)">
      <path d="M128 116C149 92 161 63 151 34C178 48 194 72 191 96C187 123 159 139 132 140C119 140 114 130 128 116Z"/>
      <path d="M128 116C149 92 161 63 151 34C178 48 194 72 191 96C187 123 159 139 132 140C119 140 114 130 128 116Z" transform="rotate(120 128 128)"/>
      <path d="M128 116C149 92 161 63 151 34C178 48 194 72 191 96C187 123 159 139 132 140C119 140 114 130 128 116Z" transform="rotate(240 128 128)"/>
    </g>
    <circle cx="128" cy="128" r="13" fill="#ffffff" stroke="#087c91" stroke-width="7"/>
    <circle cx="128" cy="128" r="104" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="3"/>
    <circle cx="128" cy="128" r="108.5" fill="none" stroke="#173f48" stroke-opacity="0.16" stroke-width="3"/>
  </g>
</svg>
