<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="White arcade ball with turquoise swoosh">
<defs>
  <radialGradient id="body" cx="32%" cy="25%" r="78%">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset=".42" stop-color="#f7f7f4"/>
    <stop offset=".76" stop-color="#e7e8e6"/>
    <stop offset="1" stop-color="#c9cecf"/>
  </radialGradient>
  <linearGradient id="swoosh" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0" stop-color="#1ba6ad"/>
    <stop offset=".5" stop-color="#27c3c9"/>
