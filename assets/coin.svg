<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Driftline coin</title>
  <desc id="desc">A centered honey-gold arcade coin stamped with the Driftline horizon mark.</desc>
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff38a"/>
      <stop offset="0.42" stop-color="#ffc62d"/>
      <stop offset="1" stop-color="#d77900"/>
    </linearGradient>
    <radialGradient id="face" cx="40%" cy="34%" r="72%">
      <stop offset="0" stop-color="#ffe778"/>
      <stop offset="0.58" stop-color="#ffbd25"/>
      <stop offset="1" stop-color="#e89109"/>
    </radialGradient>
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
