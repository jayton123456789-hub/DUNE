<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Driftline arcade game icon</title>
  <desc id="desc">A bright white ball flying over a smooth blue dune under a warm sunset sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8f70"/>
      <stop offset="0.55" stop-color="#ffc56f"/>
      <stop offset="1" stop-color="#fff2c4"/>
    </linearGradient>
    <linearGradient id="dune" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1876d2"/>
      <stop offset="1" stop-color="#0b3f8a"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="28%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e8f7ff"/>
      <stop offset="1" stop-color="#8fd7ff"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#07356c" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <circle cx="392" cy="112" r="46" fill="#fff8d7" opacity="0.9"/>
  <path d="M-30 375C75 238 168 462 286 320C376 212 447 285 550 180V550H-30Z" fill="url(#dune)"/>
  <path d="M-20 407C98 299 181 466 303 352C393 268 456 316 538 250" fill="none" stroke="#5ec8ff" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
  <g filter="url(#shadow)">
    <circle cx="246" cy="222" r="62" fill="url(#ball)" stroke="#ffffff" stroke-width="10"/>
    <path d="M209 222H283M246 185V259" stroke="#6abff0" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  </g>
  <g fill="#ffd44d" stroke="#ffffff" stroke-width="6">
    <circle cx="342" cy="205" r="18"/>
    <circle cx="384" cy="181" r="16"/>
    <circle cx="422" cy="169" r="14"/>
  </g>
</svg>
